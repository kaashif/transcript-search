{% extends "layout.html" %}
{% block nav_random %}active{% endblock %}
{% block content %}
<section class="page-heading compact">
  <div>
    <p class="eyebrow">Generated script</p>
    <h1>{{ episode }}</h1>
  </div>
  <a class="primary-button" href="/random/">New random</a>
</section>

<div class="alert alert-info">
  This URL always produces the same generated script, so it can be shared.
</div>

<section class="transcript-surface">
  <pre>{{ parsed_transcript }}</pre>
</section>
{% endblock %}
