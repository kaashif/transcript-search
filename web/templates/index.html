{% extends "layout.html" %}
{% block nav_search %}active{% endblock %}
{% block content %}
<section class="tool-heading">
  <h1>Search</h1>
  <p>Blank fields are ignored. Results are capped at 1000 matches.</p>
</section>

<form class="search-panel" action="/search" method="GET">
  <div class="field-grid">
    <div class="field field-wide">
      <label for="speech">Enter a word or phrase you are looking for:</label>
      <input type="text" id="speech" name="speech" placeholder="Word or phrase">
    </div>
    <div class="field">
      <label for="person">Who said it?</label>
      <input type="text" id="person" name="person" placeholder="e.g. O'Neill">
    </div>
    <div class="field">
      <label for="present">Who else was present?</label>
      <input type="text" id="present" name="present" placeholder="e.g. Carter">
    </div>
    <div class="field">
      <label for="place">In which location was it spoken?</label>
      <input type="text" id="place" name="place" placeholder="e.g. Gate Room">
    </div>
    <div class="field">
      <label for="episode_title">What was the title of the episode?</label>
      <input type="text" id="episode_title" name="episode_title" placeholder="e.g. Window of Opportunity">
    </div>
  </div>

  <div class="option-section">
    <span class="option-label">Match mode</span>
    <div class="inline-options" role="radiogroup" aria-label="Match mode">
      <label><input type="radio" name="andor" value="and" checked> AND (match all parameters)</label>
      <label><input type="radio" name="andor" value="or"> OR (match any parameter)</label>
    </div>
  </div>

  <div class="option-section">
    <span class="option-label">Series</span>
    <div class="series-grid">
      <label><input type="checkbox" checked name="series" value="sg1"> Stargate: SG-1</label>
      <label><input type="checkbox" checked name="series" value="atl"> Stargate: Atlantis</label>
      <label><input type="checkbox" checked name="series" value="tos"> Star Trek: The Original Series</label>
      <label><input type="checkbox" checked name="series" value="ds9"> Star Trek: Deep Space 9</label>
      <label><input type="checkbox" checked name="series" value="tng"> Star Trek: The Next Generation</label>
      <label><input type="checkbox" checked name="series" value="voy"> Star Trek: Voyager</label>
      <label><input type="checkbox" checked name="series" value="ent"> Star Trek: Enterprise</label>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="primary-button">Search</button>
  </div>
</form>
{% endblock %}
